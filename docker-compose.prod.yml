# Production docker-compose for VEGAS IT GLOBAL HRMS
# Usage: docker compose -f docker-compose.prod.yml up -d
# Built on: frappe_docker (https://github.com/frappe/frappe_docker)
#
# Stack:
#   - Frappe Framework v15.104.0
#   - ERPNext v15.104.2
#   - Frappe HRMS v15.58.8
#   - MariaDB 11.8
#   - Redis 6.2
#   - Nginx (frontend reverse proxy)
#
# To build the image:
#   export APPS_JSON_BASE64=$(base64 -w 0 apps.json)
#   docker build --build-arg=FRAPPE_PATH=https://github.com/frappe/frappe \
#     --build-arg=FRAPPE_BRANCH=version-15 \
#     --build-arg=APPS_JSON_BASE64=$APPS_JSON_BASE64 \
#     --tag=vegas-hrms:v15 \
#     --file=images/layered/Containerfile .
#
# Based on frappe_docker compose.yaml + overrides/compose.mariadb.yaml + overrides/compose.redis.yaml + overrides/compose.noproxy.yaml
version: "3"
services:
  backend:
    image: vegas-hrms:v15
    restart: unless-stopped
    depends_on:
      configurator:
        condition: service_completed_successfully
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  configurator:
    image: vegas-hrms:v15
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps_txt; bench set-config -g db_host db; bench set-config -gp db_port 3306;
        bench set-config -g redis_cache redis://redis-cache:6379;
        bench set-config -g redis_queue redis://redis-queue:6379;
        bench set-config -g redis_socketio redis://redis-queue:6379;
        bench set-config -gp socketio_port 9000;
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  frontend:
    image: vegas-hrms:v15
    restart: unless-stopped
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: hrms.cloudagents.uk
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120s
      CLIENT_MAX_BODY_SIZE: 50m
    depends_on:
      - backend
      - websocket
    ports:
      - "8080:8080"
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  websocket:
    image: vegas-hrms:v15
    restart: unless-stopped
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    depends_on:
      configurator:
        condition: service_completed_successfully
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-short:
    image: vegas-hrms:v15
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "short,default"]
    depends_on:
      configurator:
        condition: service_completed_successfully
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-long:
    image: vegas-hrms:v15
    restart: unless-stopped
    command: ["bench", "worker", "--queue", "long,default,short"]
    depends_on:
      configurator:
        condition: service_completed_successfully
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  scheduler:
    image: vegas-hrms:v15
    restart: unless-stopped
    command: ["bench", "schedule"]
    depends_on:
      configurator:
        condition: service_completed_successfully
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  db:
    image: mariadb:11.8
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

volumes:
  db-data:
  redis-queue-data:
  sites:
