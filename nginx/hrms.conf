# VEGAS IT GLOBAL - Nginx reverse proxy for HRMS
# Place at: /etc/nginx/sites-available/hrms.conf
# SSL managed by certbot

server {
    server_name hrms.cloudagents.uk;
    client_max_body_size 50m;

    # Custom employee portal (Design 3 - Colorful & Friendly)
    location = /portal { return 301 /portal/; }
    location /portal/ {
        alias /var/www/html/portal/;
        index index.html;
        try_files $uri $uri/ /portal/index.html;
    }

    # Custom manager portal (HR Admin Dashboard)
    location = /manager { return 301 /manager/; }
    location /manager/ {
        alias /var/www/html/manager/;
        index index.html;
        try_files $uri $uri/ /manager/index.html;
    }

    # Custom branded login page
    location = /vegas-login { return 301 /vegas-login/; }
    location /vegas-login/ {
        alias /var/www/html/vegas-login/;
        index index.html;
        try_files $uri $uri/ /vegas-login/index.html;
    }

    # Custom theme CSS (injected into all Frappe pages)
    location /css/vegas-theme.css {
        alias /var/www/html/css/vegas-theme.css;
        add_header Cache-Control "public, max-age=300";
    }

    # UI mockups (for design preview)
    location /mockups/ {
        alias /var/www/html/mockups/;
        index index.html;
    }

    # Root → branded login
    location = / { return 302 /vegas-login/; }

    # Proxy all other requests to Frappe (with CSS injection)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host hrms.cloudagents.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Inject custom theme CSS into all HTML responses
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '</head>' '<link rel="stylesheet" href="/css/vegas-theme.css"></head>';
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/hrms.cloudagents.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrms.cloudagents.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = hrms.cloudagents.uk) { return 301 https://$host$request_uri; }
    listen 80;
    server_name hrms.cloudagents.uk;
    return 404;
}
